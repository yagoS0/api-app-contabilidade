[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && npm ci && npm run prisma:generate -w @contabilidade/api"

[deploy]
startCommand = "cd ../.. && npm run start:prod -w @contabilidade/api"
healthcheckPath = "/readyz"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
