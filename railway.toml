[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"
watchPatterns = [
  "Dockerfile",
  "railway.toml",
  "docker/**",
  "apps/api/**",
  "package.json",
  "package-lock.json"
]

[deploy]
healthcheckPath = "/readyz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
