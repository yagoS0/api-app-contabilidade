name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma schema validate
        run: npx prisma validate --schema apps/api/prisma/schema.prisma

      - name: Audit migrations for destructive SQL
        run: npm run prisma:migrations:audit -w @contabilidade/api

      - name: Prisma client generate
        run: npm run prisma:generate -w @contabilidade/api

      - name: Syntax check API critical files
        run: >
          node --check apps/api/src/server.js &&
          node --check apps/api/src/routes/firm/index.js &&
          node --check apps/api/src/routes/invoices.js &&
          node --check apps/api/src/routes/nfse.js &&
          node --check apps/api/src/routes/adn.js

      - name: Build workspaces
        run: npm run build

